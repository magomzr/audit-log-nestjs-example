services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: audit
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit"]
      interval: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Containerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.container
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: